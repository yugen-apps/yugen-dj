name: yugen-dj-cicd

on:
  push:
    branches:
      - release/*
      - preview/*
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  setup_stage:
    uses: yugen-apps/yugen-templates/.github/workflows/setup.yml@main

  build_pack_stage:    
    uses: yugen-apps/yugen-templates/.github/workflows/build-msbuild-uwp-pack.yml@main
    needs: [ setup_stage ]
    with:
      project_name: "Yugen.DJ.Uwp"
      project_version: "${{ needs.setup_stage.outputs.major_minor_patch_build }}"
      solution_file: "Yugen.DJ.slnx"

  deploy_store_stage:
    uses: yugen-apps/yugen-templates/.github/workflows/deploy-uwp-store.yml@main
    needs: [ setup_stage, build_pack_stage ]
    secrets:
      azure_client_id: ${{ secrets.AZURE_STORE_CLIENT_ID }}
      azure_client_secret: ${{ secrets.AZURE_STORE_CLIENT_SECRET }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      store_seller_id: ${{ secrets.STORE_SELLER_ID  }}
    with:
      artifact_name: "Yugen.DJ.Uwp"
      project_version: "${{ needs.setup_stage.outputs.major_minor_patch_build }}"
      store_app_id: "9PKX15RGL06W"